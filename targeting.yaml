# ============================================================================
# polymer-ai-tracker — targeting.yaml
# ----------------------------------------------------------------------------
# Single source of truth for WHAT to look for and WHERE to look.
# Every source adapter reads this; the relevance/quality gate reads the
# vocabulary + scoring blocks. Tune precision vs. recall here, not in code.
#
# One thing to fill in before first run:
#   1. Verify each feed URL under sources.* on first run (feeds drift; the
#      adapter should log any that 404 so you can prune them). Lines marked
#      `# verify` are best-effort patterns most likely to need a check.
# ============================================================================

meta:
  lookback_hours: 168         # freshness window (7 days) — matches the weekly run cadence
  timezone: America/Los_Angeles
  contact_email: "tengteng3254@gmail.com"

# ----------------------------------------------------------------------------
# SITE IDENTITY — strings used in the header, <title>/meta tags, and RSS feed
# ----------------------------------------------------------------------------
site:
  name: "Polymind"
  tagline: "AI tools for polymer & materials development"
  description: >-
    A daily feed plus weekly synthesis of the latest AI tools and methods for
    polymer and materials development — fresh, sourced, and curated.
  url: "https://lema-3254.github.io/Polymind/"   # GitHub Pages project URL; custom domain later

# ----------------------------------------------------------------------------
# TARGETING VOCABULARY  — the cross-product that defines "polymer + AI"
# Match rule (applied by adapters that support keyword filtering, e.g. arXiv,
# Google News): an item is a CANDIDATE if it hits >=1 ai_term AND >=1
# materials_term. polymer_boost_terms raise the relevance score later.
# exclude_terms hard-drop obvious off-topic matches before they reach the LLM.
# Keep excludes conservative — the gate is the real filter; this just saves
# tokens on clear noise.
# ----------------------------------------------------------------------------
targeting:
  ai_terms:
    - machine learning
    - deep learning
    - neural network
    - graph neural network
    - GNN
    - message passing
    - equivariant
    - transformer
    - large language model
    - LLM
    - foundation model
    - generative model
    - diffusion model
    - variational autoencoder
    - generative adversarial
    - reinforcement learning
    - active learning
    - Bayesian optimization
    - surrogate model
    - machine learning potential
    - interatomic potential
    - neural network potential
    - inverse design
    - property prediction
    - high-throughput screening
    - autonomous experimentation
    - self-driving laboratory
    - representation learning
    - Gaussian process
    - Gaussian process regression
    - QSPR
    - QSAR
    - computer vision
    - digital twin

  # Domain gate is POLYMER-CENTRIC by design: a candidate must hit >=1 ai_term AND >=1 of these
  # polymer/soft-matter terms. Generic "materials informatics / alloy / concrete / semiconductor"
  # work no longer passes on keywords alone — the LLM rubric (prompts/relevance.md) is the fine filter.
  materials_terms:
    # core polymer chemistry
    - polymer
    - polymeric
    - polymers
    - macromolecule
    - copolymer
    - block copolymer
    - monomer
    - polymerization
    - polyolefin
    - polyethylene
    - polypropylene
    - polyamide
    - polyimide
    - polyester
    - polyurethane
    - epoxy
    - elastomer
    - rubber
    - thermoplastic
    - thermoset
    - resin
    - plastic
    - plastics
    - vitrimer
    - hydrogel
    - soft matter
    - polymer composite
    - polymer blend
    - polymer nanocomposite
    # category anchors: processing, recycling, characterization adjacency
    - polymer membrane
    - polymer electrolyte
    - formulation
    - injection molding
    - extrusion
    - compounding
    - depolymerization
    - plastic recycling
    - PFAS
    # polymer informatics platforms & databases (category 7)
    - polymer informatics
    - PoLyInfo
    - PI1M
    - Khazana
    - RadonPy
    - polyBERT
    - Polymer Genome

  polymer_boost_terms:        # +score; strongest polymer signals
    - polymer
    - polymeric
    - macromolecule
    - copolymer
    - block copolymer
    - monomer
    - polymerization
    - polyolefin
    - polyurethane
    - epoxy
    - elastomer
    - thermoplastic
    - thermoset
    - resin
    - vitrimer
    - hydrogel
    - soft matter
    - rheology
    - glass transition
    - crosslink
    - depolymerization
    - polymer informatics
    - PoLyInfo
    - PI1M
    - Khazana
    - RadonPy

  exclude_terms:              # hard-drop clearly off-scope matches (kept conservative)
    - clinical trial
    - medical diagnosis
    - genomics
    - protein folding
    - drug discovery
    - recommender system
    - sentiment analysis
    - self-driving car
    - autonomous driving
    - stock market
    - lattice gauge theory
    - gauge theory
    - crop yield
    - remote sensing
    - superalloy

  # Fixed theme taxonomy — the scoring model MUST tag each kept item with exactly one of these
  # labels (or "Other"). Keeps feed/archive themes consistent instead of free-text sentences.
  themes:
    - Property Prediction
    - Generative & Inverse Design
    - Characterization
    - Processing Optimization
    - Recycling & Sustainability
    - LLMs in Materials Science
    - Informatics Platforms & Databases

# ----------------------------------------------------------------------------
# SOURCES — Tier A (curated firehoses): poll, take all new, then filter
# ----------------------------------------------------------------------------
sources:

  arxiv:
    enabled: true
    tier: A
    api_base: "http://export.arxiv.org/api/query"   # stable; RSS alt: https://rss.arxiv.org/rss/<cat>
    categories:
      - cond-mat.soft        # soft condensed matter (polymers, soft matter)
      - cond-mat.mtrl-sci    # materials science
      - physics.chem-ph      # chemical physics
      # cs.LG / cs.CE dropped: huge general ML/engineering firehoses, low polymer signal
    # logic: pull new submissions in each category, keep those whose
    # title/abstract satisfy the targeting match rule above.
    filter_with_vocabulary: true

  openalex:
    enabled: true
    tier: A
    api_base: "https://api.openalex.org/works"
    # OpenAlex `search` covers title+abstract+fulltext. Combine with a date
    # filter. Add topic/concept IDs once you've looked them up for tighter
    # recall (find them at https://api.openalex.org/topics?search=polymer ).
    search: "(machine learning OR deep learning OR neural network OR generative OR language model OR inverse design OR Bayesian optimization) AND (polymer OR macromolecule OR copolymer OR elastomer OR thermoplastic OR thermoset OR plastic OR polyurethane OR epoxy OR hydrogel OR polymer informatics)"
    filters:
      from_publication_date: "{lookback_date}"   # adapter fills from lookback_hours
    # optional, fill after lookup:
    # topic_ids: ["T...", "T..."]      # e.g. polymer science, materials informatics
    per_page: 200
    mailto_from_meta: true

  crossref:
    enabled: true
    tier: A
    api_base: "https://api.crossref.org/works"
    query: "machine learning polymer property prediction inverse design characterization recycling informatics"
    filters:
      from-pub-date: "{lookback_date}"
      type: "journal-article"
    rows: 100

  journal_rss:               # venue = quality filter; take all, light-filter
    enabled: true
    tier: A
    feeds:
      - name: "npj Computational Materials"
        url: "https://www.nature.com/npjcompumats.rss"
      - name: "Nature Computational Science"
        url: "https://www.nature.com/natcomputsci.rss"
      - name: "Nature Materials"
        url: "https://www.nature.com/nmat.rss"
      - name: "Matter (Cell Press)"
        url: "https://www.cell.com/matter/current.rss"                       # verify
      - name: "Science Advances"
        url: "https://www.science.org/action/showFeed?type=etoc&feed=rss&jc=sciadv"  # verify
    disabled_feeds:
      - name: "Digital Discovery (RSC)"
        url: "https://feeds.rsc.org/rss/dd"
        reason: "Replacement RSS link currently fails TLS in live smoke tests; revisit before enabling."
      - name: "Macromolecules (ACS)"
        url: "https://pubs.acs.org/action/showFeed?type=etoc&feed=rss&jc=mamobx"
        reason: "ACS RSS returns HTTP 403 in live smoke tests."
      - name: "Chemistry of Materials (ACS)"
        url: "https://pubs.acs.org/action/showFeed?type=etoc&feed=rss&jc=cmatex"
        reason: "ACS RSS returns HTTP 403 in live smoke tests."
      - name: "J. Chem. Inf. Model. (ACS)"
        url: "https://pubs.acs.org/action/showFeed?type=etoc&feed=rss&jc=jcisd8"
        reason: "ACS RSS returns HTTP 403 in live smoke tests."

  # -- Tier B: labs & research orgs (RSS blogs; vocabulary-gated like journal_rss) --
  org_blogs:
    enabled: true
    tier: B
    feeds:
      - name: "Google DeepMind Blog"
        url: "https://deepmind.google/blog/rss.xml"
      - name: "Microsoft Research Blog"
        url: "https://www.microsoft.com/en-us/research/feed/"
      - name: "Google Research Blog"
        url: "https://research.google/blog/rss/"
      - name: "Berkeley Lab (LBNL) News"
        url: "https://newscenter.lbl.gov/feed/"
    # Add materials-AI companies as they publish: Citrine, Schrödinger,
    # Orbital Materials, Radical AI, etc.

  # -- Tier C: university press rooms (broad — leans hard on the vocabulary gate) --
  university_news:
    enabled: true
    tier: C
    feeds:
      - name: "MIT News"
        url: "https://news.mit.edu/rss/feed"
      - name: "MIT News — Materials Science & Engineering"
        url: "https://news.mit.edu/rss/topic/materials-science-and-engineering"
      - name: "Stanford News"
        url: "https://news.stanford.edu/feed/"
      - name: "UC Berkeley News"
        url: "https://news.berkeley.edu/feed/"
      - name: "Georgia Tech Research News"
        url: "https://research.gatech.edu/rss.xml"
      - name: "NIST News"
        url: "https://www.nist.gov/news-events/news/rss.xml"

  # -- Tier C: general science/tech web news (topic feeds; vocabulary-gated) --
  web_news:
    enabled: true
    tier: C
    feeds:
      - name: "ScienceDaily — Materials Science"
        url: "https://www.sciencedaily.com/rss/matter_energy/materials_science.xml"
      - name: "ScienceDaily — Artificial Intelligence"
        url: "https://www.sciencedaily.com/rss/computers_math/artificial_intelligence.xml"
      - name: "Phys.org — Polymers"
        url: "https://phys.org/rss-feed/chemistry-news/polymers/"
      - name: "Phys.org — Materials Science"
        url: "https://phys.org/rss-feed/chemistry-news/materials-science/"

  # -- Tier C: open web / news (query mode — noisy, leans on the gate) --
  google_news:
    enabled: true
    tier: C
    rss_template: "https://news.google.com/rss/search?q={query}&hl=en-US&gl=US&ceid=US:en"
    queries:                                  # one per target category
      - "machine learning polymer property prediction"
      - "generative AI polymer inverse design"
      - "AI polymer characterization spectroscopy microscopy"
      - "machine learning injection molding extrusion polymer process"
      - "AI plastic recycling depolymerization sustainability"
      - "large language model materials science polymer"
      - "polymer informatics database PolyInfo Citrine Polymerize"

  # -- Tier D: social (build last) --
  social:
    enabled: false
    x:
      mode: "curated_list"          # ~30 high-signal accounts, third-party read API
      read_api: "twitterapi.io"     # official X reads are pay-per-use, no free tier
    linkedin:
      mode: "manual_paste"          # no usable read API

# ----------------------------------------------------------------------------
# SCORING GATE — Claude relevance + quality scoring
# ----------------------------------------------------------------------------
scoring:
  model: "claude-haiku-4-5-20251001"   # cheap scoring
  rubric_prompt: "prompts/relevance.md"
  scale: 100                            # scores are 0–100
  max_candidates: 80                    # cap items sent to the model per run (speed + cost)
  min_score: 70                         # keep items (by relevance) >= this; tune to land ~20 quality/week
  # "High signal" featured section requires BOTH bars: relevance >= high_relevance_score AND
  # quality >= high_quality_score. The per-card score badge highlights on relevance >= high_relevance_score.
  high_relevance_score: 80
  high_quality_score: 80
  # Note: tier/polymer priors are NOT added to model scores (the rubric already judges polymer fit);
  # they only shape the keyword bootstrap fallback when no model is available.

# ----------------------------------------------------------------------------
# ENRICHMENT — concise item summaries after scoring + dedup
# ----------------------------------------------------------------------------
enrich:
  model: "claude-sonnet-4-5-20250929"   # stronger tier for user-facing summaries
  prompt: "prompts/enrich.md"
  max_items_per_run: 25                  # cost cap; ~enough for the weekly quality set

# ----------------------------------------------------------------------------
# WEEKLY SYNTHESIS — trend narrative over the week's included items
# ----------------------------------------------------------------------------
synth:
  model: "claude-sonnet-4-5-20250929"   # stronger tier for weekly synthesis
  prompt: "prompts/synth.md"

# ----------------------------------------------------------------------------
# DEDUP / NOVELTY — the "don't repeat" layer
# ----------------------------------------------------------------------------
dedup:
  embedding_model: "voyage-3"           # or local: sentence-transformers/bge-small-en-v1.5
  similarity_threshold: 0.85            # >= this vs. 30-day memory => duplicate
  window_days: 30                       # rolling memory horizon
  on_duplicate: "drop"                  # or "tag_as_update"
